# Copy to: .github/workflows/hetzner-translate-cores-deploy.yml
# Secrets: HETZNER_SSH_HOST, HETZNER_SSH_USER, HETZNER_SSH_KEY, HETZNER_REMOTE_REPO_PATH
# Set HETZNER_REMOTE_REPO_PATH to /root/deploy if you only copied deploy/for-server-root there.

name: Deploy Hetzner translate cores

on:
  workflow_dispatch:

jobs:
  skip-notice:
    runs-on: ubuntu-latest
    if: ${{ secrets.HETZNER_SSH_HOST == '' || secrets.HETZNER_SSH_USER == '' || secrets.HETZNER_SSH_KEY == '' || secrets.HETZNER_REMOTE_REPO_PATH == '' }}
    steps:
      - name: Secrets not configured
        run: |
          echo "Add HETZNER_SSH_HOST, HETZNER_SSH_USER, HETZNER_SSH_KEY, HETZNER_REMOTE_REPO_PATH to Actions secrets."
          echo "Use HETZNER_REMOTE_REPO_PATH=/root/deploy after copying deploy/for-server-root/* to the server."

  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.HETZNER_SSH_HOST != '' && secrets.HETZNER_SSH_USER != '' && secrets.HETZNER_SSH_KEY != '' && secrets.HETZNER_REMOTE_REPO_PATH != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull and start LibreTranslate stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_SSH_HOST }}
          username: ${{ secrets.HETZNER_SSH_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            REPO="${{ secrets.HETZNER_REMOTE_REPO_PATH }}"
            if [ -f "$REPO/docker-compose.yml" ]; then
              cd "$REPO" && docker compose pull && docker compose up -d
            else
              cd "$REPO" && docker compose -f deploy/hetzner-core-pinning/docker-compose.core-pinning.yml pull && docker compose -f deploy/hetzner-core-pinning/docker-compose.core-pinning.yml up -d
            fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify cores from CI
        env:
          HETZNER_CORE1_TRANSLATE_BASE: ${{ secrets.HETZNER_CORE1_TRANSLATE_BASE }}
          HETZNER_CORE2_TRANSLATE_BASE: ${{ secrets.HETZNER_CORE2_TRANSLATE_BASE }}
          HETZNER_WORKER_HOST: ${{ secrets.HETZNER_WORKER_HOST }}
        run: node scripts/verify-hetzner-translate-cores.mjs
