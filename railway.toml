# Deploy from the repository root so pnpm can link workspace:* packages (@workspace/db, @workspace/api-zod).
# In Railway: set the service "Root Directory" to empty / repo root — NOT artifacts/api-server.
# If Root Directory is wrong, you will see tsc errors (missing express, @workspace/db, @types/node).
#
# REQUIRED: Add a PostgreSQL service, then in THIS service → Variables → New variable →
# "Variable Reference" → pick Postgres → DATABASE_URL (copies the connection string here).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No "VAR=value cmd" here — Docker execs without a shell; NODE_ENV is set in Dockerfile.
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
