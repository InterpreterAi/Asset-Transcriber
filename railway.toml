# Deploy from the repository root so pnpm can link workspace:* packages (@workspace/db, @workspace/api-zod).
# In Railway: set the service "Root Directory" to empty / repo root — NOT artifacts/api-server.
# If Root Directory is wrong, you will see tsc errors (missing express, @workspace/db, @types/node).
#
# ── Postgres → API (required; config-as-code cannot set cross-service references) ──
# DATABASE_URL exists on the Postgres *plugin* service by default; it is NOT visible to other
# services until you add a reference on the service that runs THIS Dockerfile.
#
# On the API / web service (the one using this railway.toml): Variables → New variable →
#   "Variable Reference" → select your Postgres service → DATABASE_URL
# Or raw value (double braces — replace Postgres if your DB service name differs):
#   DATABASE_URL=${{Postgres.DATABASE_URL}}
#
# After local dev deploy (NODE_ENV=development), GET /debug/db-env can verify DB probe. In production these /debug/* routes return 404.
# See railway.api.env.example for copy-paste lines.
#
# CLI (project linked: `railway link`): use your API service name from the dashboard / `railway service`
#   railway variable set -s <API_SERVICE_NAME> DATABASE_URL='${{Postgres.DATABASE_URL}}'
#
# The Docker image builds the React app and serves it from "/" on the same URL as /api/*.
#
# Live transcription: set SONIOX_API_KEY (or SONIOX_STT_API_KEY) on this same API service.
# See railway.api.env.example and repo-root .env.example for local dev.
#
# Sessions: Dockerfile sets SESSION_STORE=memory by default (fixes login/Google 500s when
# Postgres session storage fails). Override with SESSION_STORE=postgres if you run multiple
# replicas; then ensure user_sessions exists (startup migration creates it when DB is reachable).
#
# session.ts sets TEMP_FORCE_MEMORY_IN_SOURCE=true (forces MemoryStore even if SESSION_STORE=postgres).
# Set DISABLE_TEMP_FORCE_MEMORY=1 on the service to respect SESSION_STORE only, or flip the constant to false after fixing Postgres sessions.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No "VAR=value cmd" here — Docker execs without a shell; NODE_ENV is set in Dockerfile.
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
