# Deploy from the repository root so pnpm can link workspace:* packages (@workspace/db, @workspace/api-zod).
# In Railway: set the service "Root Directory" to empty / repo root — NOT artifacts/api-server.
# If Root Directory is wrong, you will see tsc errors (missing express, @workspace/db, @types/node).
#
# REQUIRED: Add a PostgreSQL service, then in THIS service → Variables → New variable →
# "Variable Reference" → pick Postgres → DATABASE_URL (copies the connection string here).
# The Docker image builds the React app and serves it from "/" on the same URL as /api/*.
#
# Sessions: Dockerfile sets SESSION_STORE=memory by default (fixes login/Google 500s when
# Postgres session storage fails). Override with SESSION_STORE=postgres if you run multiple
# replicas; then ensure user_sessions exists (startup migration creates it when DB is reachable).
#
# session.ts sets TEMP_FORCE_MEMORY_IN_SOURCE=true (forces MemoryStore even if SESSION_STORE=postgres).
# Set DISABLE_TEMP_FORCE_MEMORY=1 on the service to respect SESSION_STORE only, or flip the constant to false after fixing Postgres sessions.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No "VAR=value cmd" here — Docker execs without a shell; NODE_ENV is set in Dockerfile.
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
