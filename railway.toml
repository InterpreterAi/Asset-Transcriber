# Deploy from the repository root so pnpm can link workspace:* packages (@workspace/db, @workspace/api-zod).
# In Railway: set the service root directory to the repo root (not artifacts/api-server).
#
# REQUIRED: Add a PostgreSQL service, then in THIS service → Variables → New variable →
# "Variable Reference" → pick Postgres → DATABASE_URL (copies the connection string here).

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm run typecheck && pnpm run build:api-server"

[deploy]
startCommand = "NODE_ENV=production node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
